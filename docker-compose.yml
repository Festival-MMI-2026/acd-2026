services:
  postgresql:
    image: postgres:16-alpine
    container_name: acd-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: acd_db
    volumes:
      - postgresql_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: acd-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgresql
    depends_on:
      - postgresql

  mailpit:
    image: axllent/mailpit:latest
    container_name: acd-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgresql_data:
