services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acd-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://admin:password@postgresql:5432/acd_db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOTENBERG_URL: http://gotenberg:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: ${MAIL_FROM:-ACD <noreply@acd.local>}
    depends_on:
      postgresql:
        condition: service_healthy
      gotenberg:
        condition: service_started
      mailpit:
        condition: service_started

  postgresql:
    image: postgres:16-alpine
    container_name: acd-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: acd_db
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d acd_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: acd-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgresql
    depends_on:
      - postgresql

  mailpit:
    image: axllent/mailpit:latest
    container_name: acd-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: acd-gotenberg
    restart: unless-stopped
    ports:
      - "3001:3000"

volumes:
  postgresql_data:
