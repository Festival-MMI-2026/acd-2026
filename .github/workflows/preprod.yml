name: Preprod Deploy

on:
  push:
    branches: [preprod]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build

      - name: Create artifact
        run: |
          tar -czf app.tar.gz \
            .output \
            prisma \
            package.json \
            package-lock.json \
            docker-compose.yml \
            ecosystem.config.cjs

      - uses: actions/upload-artifact@v4
        with:
          name: preprod-build
          path: app.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: preprod-build

      - name: Copy artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.tar.gz"
          target: "/var/www/acd-preprod/"

      - name: Deploy and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            PM2="/home/festival-deployer/.nvm/versions/node/v20.20.0/bin/pm2"

            cd /var/www/acd-preprod

            rm -rf .output prisma package.json package-lock.json ecosystem.config.cjs

            tar -xzf app.tar.gz
            rm app.tar.gz

            $PM2 delete acd-preprod || true
            $PM2 start ecosystem.config.cjs --force
            $PM2 save

            docker compose down
            docker compose up -d postgresql adminer mailpit gotenberg
