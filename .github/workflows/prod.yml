name: Prod Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build

      - name: Create artifact
        run: |
          tar -czf app.tar.gz \
            .output \
            prisma \
            prisma.config.ts \
            package.json \
            package-lock.json \
            docker-compose.yml \
            Caddyfile \
            Dockerfile

      - uses: actions/upload-artifact@v4
        with:
          name: prod-build
          path: app.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: prod-build

      - name: Clean server disk space before upload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Purge du cache de build Docker et des images inutilisées..."
            docker builder prune -a -f
            docker image prune -a -f

      - name: Copy artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.tar.gz"
          target: "/var/www/acd-prod/"

      - name: Deploy via Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          env:
            SMTP_HOST: ${{ secrets.SMTP_HOST }}
            SMTP_PORT: ${{ secrets.SMTP_PORT }}
            SMTP_USER: ${{ secrets.SMTP_USER }}
            SMTP_PASS: ${{ secrets.SMTP_PASS }}
            MAIL_FROM: ${{ secrets.MAIL_FROM }}
          script: |
            set -e
            cd /var/www/acd-prod

            # Injecter les variables SMTP dans le .env
            sed -i '/^SMTP_/d' .env
            echo "SMTP_HOST=${SMTP_HOST}" >> .env
            echo "SMTP_PORT=${SMTP_PORT}" >> .env
            echo "SMTP_USER=${SMTP_USER}" >> .env
            echo "SMTP_PASS=${SMTP_PASS}" >> .env
            echo "MAIL_FROM=${MAIL_FROM}" >> .env

            docker compose down

            rm -rf .output

            tar -xzf app.tar.gz
            rm app.tar.gz

            docker compose up -d --build

            docker image prune -f
