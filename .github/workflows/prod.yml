name: Prod Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # GHCR exige des noms en minuscules
  IMAGE: ghcr.io/festival-mmi-2026/acd-app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Cache des layers Docker entre runs CI (BuildKit + GitHub Actions cache)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      REGISTRY_USER: ${{ github.actor }}
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            Caddyfile
          sparse-checkout-cone-mode: false

      - name: Copy compose & caddy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "/var/www/acd-prod/"

      - name: Pull image and rolling-update app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          envs: SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,MAIL_FROM,REGISTRY_USER,REGISTRY_TOKEN
          script: |
            set -e
            cd /var/www/acd-prod

            # Synchronise le bloc SMTP dans .env
            sed -i '/^SMTP_/d' .env
            sed -i '/^MAIL_FROM/d' .env
            echo "SMTP_HOST=${SMTP_HOST}" >> .env
            echo "SMTP_PORT=${SMTP_PORT}" >> .env
            echo "SMTP_USER=${SMTP_USER}" >> .env
            echo "SMTP_PASS=${SMTP_PASS}" >> .env
            echo "MAIL_FROM=${MAIL_FROM}" >> .env

            # Login GHCR avec le token éphémère du workflow (read:packages)
            echo "${REGISTRY_TOKEN}" | docker login ghcr.io -u "${REGISTRY_USER}" --password-stdin

            # Pull la nouvelle image et redémarre uniquement l'app
            # (postgres / caddy / gotenberg ne sont pas touchés → pas de downtime sur la DB ni le reverse-proxy)
            docker compose pull app
            docker compose up -d --no-deps app

            # Nettoyage léger : seulement les images orphelines
            # (ne PAS faire `docker builder prune -a -f` ici — ça vide le cache et casse les rebuilds)
            docker image prune -f
