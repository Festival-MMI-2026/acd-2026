name: Prod Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build

      - name: Create artifact
        run: |
          tar -czf app.tar.gz \
            .output \
            prisma \
            prisma.config.ts \
            package.json \
            package-lock.json \
            docker-compose.yml \
            Caddyfile \
            Dockerfile

      - uses: actions/upload-artifact@v4
        with:
          name: prod-build
          path: app.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: prod-build

      # 1. NOUVELLE ÉTAPE : Nettoyage avant le transfert SCP
      - name: Clean server disk space before upload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Puge du cache de build Docker et des images inutilisées..."
            docker builder prune -a -f
            docker image prune -a -f

      - name: Copy artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app.tar.gz"
          target: "/var/www/acd-prod/"

      - name: Deploy via Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/acd-prod

            # 2. OPTIMISATION : Supprimer l'ancien build pour éviter l'accumulation
            rm -rf .output

            tar -xzf app.tar.gz
            rm app.tar.gz

            docker compose up -d --build

            # Nettoyage final léger après le build
            docker image prune -f
